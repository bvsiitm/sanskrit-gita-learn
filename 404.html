<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sanskrit Gita Learn</title>
    <script>
      // GitHub Pages SPA redirect
      // Stores the path in sessionStorage, then redirects to index.html
      var path = window.location.pathname;
      var base = '/sanskrit-gita-learn';
      var redirect = path.slice(base.length) || '/';
      sessionStorage.setItem('spa-redirect', redirect);
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
